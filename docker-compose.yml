version: '3.8'

services:
  backend:
    build: .
    container_name: insurance_backend
    ports:
      - "8000:8000"
    restart: always

  frontend:
    build: .
    container_name: insurance_frontend
    command: streamlit run frontend.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      # Streamlit runs in the container but the client accesses from browser.
      # Wait, Streamlit requests are made server-side in frontend.py!
      # We just updated frontend.py to use requests via API_URL for prediction
      - API_URL=http://backend:8000/predict
    depends_on:
      - backend
    restart: always
